<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Notes API</a>
        <a class="btn btn-outline-light btn-sm" href="/api/notes/">Open API</a>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="h4 mb-3">Add Note</h2>

                    <form method="post" action="/notes/new/">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" name="title" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Content</label>
                            <textarea name="content" class="form-control" rows="5" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">Save Note</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h1 class="h3 m-0">My Notes</h1>
            </div>

            {% for note in notes %}
                <div class="card shadow-sm mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="card-title mb-1">{{ note.title }}</h5>
                                <p class="text-muted small mb-2">{{ note.created_at }}</p>
                            </div>

                            <div class="d-flex gap-2">
                                <a href="/notes/{{ note.id }}/edit/" class="btn btn-outline-primary btn-sm">
                                    Edit
                                </a>
                                <a href="/notes/{{ note.id }}/delete/" class="btn btn-outline-danger btn-sm">
                                    Delete
                                </a>
                            </div>
                        </div>

                        <p class="card-text">{{ note.content }}</p>
                    </div>
                </div>
            {% empty %}
                <div class="alert alert-secondary">
                    No notes yet.
                </div>
            {% endfor %}
        </div>
    </div>
</div>

</body>
</html>
